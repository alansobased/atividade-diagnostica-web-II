<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Rede social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-100">

    <div class="grid grid-cols-4 min-h-screen">

        <nav class="bg-white shadow-md col-span-1 p-6">
            <!-- usei a IA do canva pra gerar esses svgs dos icons -->
            <ul class="space-y-3">

                <li>
                    <button class="nav-item group">
                        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        <span>Início</span>
                    </button>
                </li>

                <li>
                    <button class="nav-item group">
                        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <span>Pesquisa</span>
                    </button>
                </li>

                <li>
                    <button class="nav-item group">
                        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Nova Postagem</span>
                    </button>
                </li>

                <li>
                    <button class="nav-item group">
                        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <span>Perfil</span>
                    </button>
                </li>

            </ul>
        </nav>


        <main class="col-span-3 p-8">

            <section class="bg-white p-6 rounded-xl shadow-md mb-6">
                <div class="flex items-center gap-4">
                    <img src="img/user.jpeg" class="w-20 h-20 rounded-full" alt="Usuário">
                    <div>
                        <label class="block font-bold text-xl">Alan Pereira</label>
                        <label class="block text-gray-500">@alan.dev</label>
                    </div>
                    <button class="ml-auto bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                        Editar Perfil
                    </button>
                </div>

                <form class="mt-6 flex gap-4">
                    <input type="text" placeholder="O que você está pensando?" class="flex-1 border rounded-lg p-2">
                    <button class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
                        Postar
                    </button>
                </form>
            </section>

            <section class="space-y-6">

                <div class="bg-white p-6 rounded-xl shadow-md">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="img/user2.jpeg" class="w-12 h-12 rounded-full">
                        <div>
                            <label class="block font-semibold">Emilly</label>
                            <label class="block text-gray-500 text-sm">@emilly.tech</label>
                        </div>
                    </div>

                    <label class="block mb-4">
                        Começando meus estudos em Desenvolvimento Web II
                    </label>

                    <div class="flex gap-6 text-gray-600">
                        <!-- tambem usei a ia do canva pra gerar esses -->
                        <button class="flex items-center gap-2 hover:text-gray-900">
                            <svg width="24" height="24" viewbox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                            </svg>
                            <span>Curtidas</span>
                        </button>
                        <button class="flex items-center gap-2 hover:text-gray-900">
                            <svg width="24" height="24" viewbox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                            </svg> <span>Comentários</span>
                        </button>
                    </div>
                </div>

            </section>

        </main>
    </div>

</body>

</html>
